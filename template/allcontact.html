{% extends "base.html"  %}
{% block content %}
    <div class="container">
            <h1>Contact Table</h1>
    <table class="table table-dark">
  <thead>
    <tr>
      <th scope="col">id</th>
      <th scope="col">Full Name</th>
      <th scope="col">Email</th>
      <th scope="col">Number</th>
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    {% for a in contact %}
    <tr>
      <th scope="row">{{a.id}}</th>
      <td>{{a.name}}</td>
      <td>{{a.email}}</td>
      <td>{{a.number}}</td>
      <td>

        <a href={% url "update_contact" pk=a.id %} class="btn btn-primary">Update</a>
        <form method="POST" action={% url "delete_contact" pk=a.id %}>
             <button type="submit" class="btn btn-danger">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
   
  </tbody>
</table>
    </div>
    

{% endblock %}
