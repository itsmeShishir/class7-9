{% extends "base.html" %}

{% block content %}

<div class="album py-5 bg-body-tertiary">
    <div class="container">

      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
         {% for a in category %}
        <div class="col">
       
        <a href="{{a.id}}"><div class="card shadow-sm">
            <img class="bd-placeholder-img card-img-top" width="100%" height="225" src={{a.img.url}} />
            <div class="card-body">
              <p class="card-text">{{a.title}}</p>
              <div class="d-flex justify-content-between align-items-center">
              </div>
            </div>
          </div>
       
          

          </div>
        </a>
         {% endfor %}
      </div>
    </div>
  </div>
{% endblock %}
