{% extends 'base.html' %}
{% block content %}
    <div class="album py-5 bg-body-tertiary">
    <div class="container">
      
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
        {% for a in context.blogs %}
        {% if a.length is 0%}
            <h1>no data </h1>
        {% else %}
        <div class="col">
          <div class="card shadow-sm">
            <img class="bd-placeholder-img card-img-top" width="100%" height="225" src={{a.img.url}} role="img" aria-label="Placeholder: Thumbnail" preserveAspectRatio="xMidYMid slice" focusable="false">
            <div class="card-body">
              <h2>{{a.title}}</h2>
              <p class="card-text">
                {{a.description}}
              </p>
              <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                  <a href={% url 'blogs-item' pk=a.id %} class="btn btn-sm btn-outline-secondary">View</a>
                  <button type="button" class="btn btn-sm btn-outline-secondary">Edit</button>
                </div>
                <small class="text-body-secondary">9 mins</small>
              </div>
            </div>
          </div>
        </div>
        {% endif %}
          {% endfor %}

      </div>
              
    </div>
  </div>
{% endblock %}
