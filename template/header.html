{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
   <div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
      <div class="col-md-3 mb-2 mb-md-0">
        <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
          <svg class="bi" width="40" height="32" role="img" aria-label="Bootstrap"><use xlink:href="#bootstrap"></use></svg>
        </a>
      </div>

      <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
        <li><a href={% url "home" %} class="nav-link px-2 link-secondary">Home</a></li>
        <li><a href={% url "category" %} class="nav-link px-2">Category</a></li>
        <li><a href={% url "blogs-items" %} class="nav-link px-2">Blog</a></li>
        <li><a href="#" class="nav-link px-2">About US</a></li>
        <li><a href={% url "contact" %} class="nav-link px-2">Contact Us</a></li>
      </ul>

      

      <div class="col-md-3 text-end">
        {% if user.is_authenticated %}
            <div class="dropdown text-end">
          <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle show" data-bs-toggle="dropdown" aria-expanded="true">
            <img src="https://github.com/mdo.png" alt="mdo" width="32" height="32" class="rounded-circle">
          </a>
          <ul class="dropdown-menu text-small show" style="position: absolute; inset: 0px auto auto 0px; margin: 0px; transform: translate3d(0px, 34px, 0px);" data-popper-placement="bottom-start">
            <li><a class="dropdown-item" href="#">New project...</a></li>
            <li><a class="dropdown-item" href={% url "contact_all" %}>List Contact</a></li>
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href={% url "logout" %}>Sign out</a></li>
          </ul>
        </div>
        
        {%else%}
        <a href={% url 'login' %} type="button" class="btn btn-outline-primary me-2">Login</a>
        <a href={% url 'register' %} class="btn btn-primary">Sign-up</a>
        {% endif %}
       
      </div>
    </header>
  </div>
